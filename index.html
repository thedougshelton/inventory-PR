<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-title" content="Inventory Entry" />
  <meta name="apple-mobile-web-app-status-bar-style" content="default" />
  <meta name="theme-color" content="#0f172a" />
  <title>Inventory Entry</title>
  <style>
    :root {
      --bg: #f8fafc;
      --card: #ffffff;
      --text: #0f172a;
      --muted: #64748b;
      --border: #dbe3ef;
      --accent: #0f172a;
      --accentText: #ffffff;
      --danger: #b91c1c;
      --success: #166534;
      --warning: #92400e;
      --soft: #eef2f7;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif;
      background: var(--bg);
      color: var(--text);
      -webkit-font-smoothing: antialiased;
    }

    .wrap {
      max-width: 760px;
      margin: 0 auto;
      padding: 18px;
      padding-bottom: 44px;
    }

    header { margin-bottom: 14px; }

    h1 {
      font-size: 28px;
      line-height: 1.1;
      margin: 0 0 6px;
    }

    .sub {
      color: var(--muted);
      margin: 0;
      font-size: 15px;
      line-height: 1.4;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 10px;
      margin: 16px 0;
    }

    .metric {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 12px;
      min-height: 78px;
    }

    .metric .label {
      font-size: 13px;
      color: var(--muted);
      margin-bottom: 6px;
    }

    .metric .value {
      font-size: 25px;
      font-weight: 700;
      letter-spacing: -0.02em;
    }

    .card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 18px;
      padding: 16px;
      margin: 14px 0;
    }

    label,
    .field-label {
      display: block;
      font-size: 14px;
      font-weight: 650;
      margin-bottom: 8px;
    }

    .field-group { margin-bottom: 16px; }

    select {
      width: 100%;
      min-height: 54px;
      border: 1px solid var(--border);
      border-radius: 16px;
      background: #fff;
      color: var(--text);
      font-size: 20px;
      font-weight: 650;
      padding: 12px 14px;
    }

    select:focus,
    input[type="text"]:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 4px rgba(15, 23, 42, 0.10);
      outline: none;
    }

    .option-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 10px;
    }

    .option-pill {
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 54px;
      border: 1px solid var(--border);
      border-radius: 16px;
      background: #fff;
      font-size: 18px;
      font-weight: 700;
      cursor: pointer;
      user-select: none;
    }

    .option-pill input {
      position: absolute;
      opacity: 0;
      pointer-events: none;
    }

    .option-pill:has(input:checked) {
      background: var(--accent);
      border-color: var(--accent);
      color: var(--accentText);
    }

    .entry-row {
      display: flex;
      gap: 10px;
      align-items: stretch;
    }

    input[type="text"] {
      width: 100%;
      font-size: 30px;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 14px 14px;
      outline: none;
      background: #fff;
      color: var(--text);
      min-height: 64px;
    }

    button {
      appearance: none;
      border: 1px solid var(--border);
      background: var(--card);
      color: var(--text);
      border-radius: 14px;
      padding: 12px 14px;
      font-size: 16px;
      font-weight: 650;
      cursor: pointer;
      min-height: 48px;
    }

    button:active { transform: translateY(1px); }

    .primary {
      background: var(--accent);
      border-color: var(--accent);
      color: var(--accentText);
      min-width: 94px;
    }

    .actions {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 10px;
      margin-top: 12px;
    }

    .danger { color: var(--danger); }

    .danger-solid {
      color: white;
      background: var(--danger);
      border-color: var(--danger);
    }

    .status {
      margin-top: 10px;
      padding: 10px 12px;
      border-radius: 14px;
      background: var(--soft);
      color: var(--muted);
      font-size: 15px;
      line-height: 1.35;
      min-height: 42px;
    }

    .status.success {
      color: var(--success);
      background: #ecfdf5;
    }

    .status.error {
      color: var(--danger);
      background: #fef2f2;
    }

    .status.warning {
      color: var(--warning);
      background: #fffbeb;
    }

    .list-head {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      align-items: baseline;
      margin-bottom: 8px;
    }

    .list-head h2 {
      margin: 0;
      font-size: 19px;
    }

    .small {
      font-size: 13px;
      color: var(--muted);
    }

    .inventory-list {
      display: grid;
      gap: 8px;
      max-height: 430px;
      overflow: auto;
      padding-right: 2px;
    }

    .row {
      display: grid;
      grid-template-columns: 54px 1fr auto;
      align-items: center;
      gap: 10px;
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 10px;
      background: #fff;
    }

    .num {
      color: var(--muted);
      font-variant-numeric: tabular-nums;
      font-size: 14px;
    }

    .code {
      font-size: 20px;
      font-weight: 750;
      letter-spacing: 0.08em;
    }

    .details {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      margin-top: 6px;
    }

    .tag {
      display: inline-flex;
      align-items: center;
      border: 1px solid var(--border);
      border-radius: 999px;
      padding: 4px 8px;
      font-size: 13px;
      color: var(--muted);
      background: #f8fafc;
      line-height: 1;
    }

    .row button {
      min-height: 38px;
      padding: 8px 10px;
      font-size: 14px;
    }

    .empty {
      color: var(--muted);
      text-align: center;
      padding: 26px 10px;
      border: 1px dashed var(--border);
      border-radius: 16px;
      background: #fff;
    }

    .help {
      font-size: 14px;
      color: var(--muted);
      line-height: 1.45;
      margin-top: 10px;
    }

    details.finish-clear summary {
      cursor: pointer;
      color: var(--muted);
      font-weight: 650;
    }

    .confirm-panel {
      margin-top: 12px;
      border: 1px solid #fecaca;
      background: #fef2f2;
      border-radius: 16px;
      padding: 12px;
    }

    .confirm-panel p {
      margin: 0 0 10px;
      color: var(--danger);
      line-height: 1.4;
      font-size: 14px;
    }

    .confirm-row {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 10px;
    }

    .confirm-row input {
      letter-spacing: 0;
      text-transform: none;
      font-size: 16px;
      min-height: 48px;
    }

    @media (max-width: 560px) {
      .wrap { padding: 14px; }
      h1 { font-size: 25px; }

      .grid { grid-template-columns: 1fr 1fr; }
      .metric:last-child { grid-column: 1 / -1; }

      .entry-row { flex-direction: column; }
      .primary { width: 100%; }

      input[type="text"] {
        font-size: 26px;
        min-height: 62px;
      }

      .actions,
      .confirm-row {
        grid-template-columns: 1fr;
      }

      .row {
        grid-template-columns: 44px 1fr auto;
      }
    }
  </style>
</head>
<body>
  <main class="wrap">
    <header>
      <h1>Inventory Entry</h1>
      <p class="sub">Select size, condition, and status. Then type a 6-character container number and press Enter.</p>
    </header>

    <section class="grid" aria-label="Inventory summary">
      <div class="metric">
        <div class="label">Entered</div>
        <div class="value" id="count">0</div>
      </div>
      <div class="metric">
        <div class="label">Duplicates Blocked</div>
        <div class="value" id="dupeCount">0</div>
      </div>
      <div class="metric">
        <div class="label">Last Entry</div>
        <div class="value" id="lastEntry">—</div>
      </div>
    </section>

    <section class="card">
      <div class="field-group">
        <label for="containerSize">Container size</label>
        <select id="containerSize">
          <option value="8 ft">8 ft</option>
          <option value="12 ft" selected>12 ft</option>
          <option value="16 ft">16 ft</option>
        </select>
      </div>

      <div class="field-group">
        <div class="field-label">Container Condition</div>
        <div class="option-grid" role="radiogroup" aria-label="Container Condition">
          <label class="option-pill">
            <input type="radio" name="containerCondition" value="Good" checked />
            Good
          </label>
          <label class="option-pill">
            <input type="radio" name="containerCondition" value="Bad" />
            Bad
          </label>
        </div>
      </div>
